name: api dev test
on:
  push:
    branches:
      - dev

jobs:
  test_api:
    name: api test
    runs-on: ubuntu-20.04
    defaults:
      run:
        working-directory: "./APIServer"
    services:
      db:
        image: mysql:latest
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: mahjongranking
          MYSQL_PASSWORD: mahjongrankingservice001
          MYSQL_DATABASE: mahjongranking
          options: >-
            --health-cmd "mysqladmin ping"
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
    env:
      DATABASE_URL: "mysql://mahjongranking:mahjongrankingservice001@localhost:3306/mahjongranking"
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./APIServer
      - run: mysql -h 127.0.0.1 -P 3306 -u root -proot < ./docker/db/privileges.sql
      - run: npm ci
      - name: Execute test
        run: |
          npm run migrate:test
          npm run ci
      - name: Publish coverage
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
